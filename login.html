<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef7ff,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#box{
    width:380px;
    background:#fff;
    padding:40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    text-align:center;
}
           #box h3{
    font-size:32px;
    color:#1f2937;
    margin-bottom:30px;
}
          input{
    width:100%;
    height:50px;
    margin-bottom:20px;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:0 15px;
    font-size:15px;
    box-sizing:border-box;
    transition:.3s;
}

input:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}
           select{
          
            display: flex;
               height: 40px;
              margin: auto;
              width: 80%;
              margin-bottom: 40px;
           }
          #submit{
    width:100%;
    height:50px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

#submit:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

a{
    text-decoration:none;
    color:#2563eb;
    font-weight:500;
}

a:hover{
    text-decoration:underline;
}
    </style>
</head>
<body>
    <div id="box">
        <h3>✨✨Login Here✨✨</h3>
        <form id="form">
            <input type="text" placeholder="Enter full name" id="fname">
            <input type="email" placeholder="Enter your Email" id="Email">
            <input type="password" placeholder="Enter password" id="password">
          <input type="submit" value="login" id="submit">

        </form>
        <a href="signup.html"><p>Don't have Account</p></a>
        <!-- <a href="signup.html">Dont have Account signup Again</a> -->
    </div>
</body>
</html>
<script src="assets/js/login.js"></script>
