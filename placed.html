<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payment</title>
    <style>
        h1 {
            text-align: center;
            color: #00afef;
        }
        body>div{
            width: auto;
            height:auto;
            margin-bottom: 30px;
        }  
        body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eef7ff,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
       button{
    width:100%;
    height:52px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}
       button:hover{
    background:#1d4ed8;
    transform:translateY(-3px);
    cursor:pointer;
}

        .success-card{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.success-card img{
    width:220px;
}

.success-card h2{
    color:#2563eb;
    margin:20px 0 10px;
}

.success-card p{
    color:#6b7280;
    line-height:1.7;
    margin-bottom:30px;
}
    </style>
</head>
<body>

<div class="success-card">

    <img src="https://st4.depositphotos.com/33945136/41707/v/380/depositphotos_417078176-stock-illustration-flat-design-order-confirmation-tick.jpg?forcejpeg=true" alt="Success">

    <h2>Order Placed Successfully 🎉</h2>

    <p>
        Thank you for shopping with MamaMars.
        Your order has been placed successfully.
    </p>

    <a href="index.html">
        <button>Continue Shopping</button>
    </a>

</div>

</body>

</html>
