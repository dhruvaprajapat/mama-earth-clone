<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .conatiner{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}
       #box{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    padding:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.3s;
}

#box:hover{
    transform:translateY(-5px);
}
       .conatiner>div>img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
}
        #box>p {
            display: block;
            text-align: center;
            margin-left: 4px;
            margin-right: 4px;
            margin-bottom: 0%;

        }

        #box>h5 {
            color: darkgreen;
            display: block;
            text-align: center;
            margin-left: 4px;
            margin-right: 4px;
            margin: 1px;
        }

        .rs {
            font-size: 25px;
            font-weight: bold;
            margin-top: 1px;
            margin-bottom: 0px;
        }

        h6 {
            display: block;
            text-align: center;
            font-size: 20px;
            margin-top: 1px;
            margin-bottom: 9px;

        }
        .del{
    width:100%;
    height:45px;
    background:#ef4444;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    margin-top:15px;
    cursor:pointer;
}

.del:hover{
    background:#dc2626;
}
        .stotal{
    width:320px;
    height:45px;
    border:1px solid #d1d5db;
    border-radius:8px;
    padding:0 15px;
    margin:20px auto;
}
        .Sub{
    width:320px;
    height:45px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.Sub:hover{
    background:#1d4ed8;
}
        body {
    font-family: sans-serif;
}

#main {
    border: 1px solid rgb(199, 196, 196);
    display: flex;
    width: 100%;
    height: 70px;
    align-items: center;
    margin: auto;
    border-radius: 5px;
}

#main>img {
    width: 170px;
    height: 30px;
    margin-left: 30px;
    cursor: pointer;
}



#icon {
    display: flex;
    /* border: 1px solid; */
    width: 400px;
    height: 70px;
    margin-left: 700px;
    gap: 70px;
    justify-content: end;
    align-items: center;
    

}
#icon>div>p{
    font-size: larger;
}

.icon {
    margin-top: 25px;
    font-size: 25px;
    color: #00afef;
    cursor: pointer;
}

.acc {
    margin-top: -0.3px;
    margin-left: -10px;
    color: #2f3337;
    font-style: normal;
    font-weight: 400px;
    font-size: 12px;
    line-height: 12px;
    cursor: pointer;
}

.lis {
    margin-top: -0.3px;
    color: #2f3337;
    font-style: normal;
    font-weight: 400px;
    font-size: 12px;
    line-height: 12px;
    margin-left: 3px;
    cursor: pointer;
}

.cart {
    margin-top: -0.3px;
    color: #2f3337;
    font-style: normal;
    font-weight: 400px;
    font-size: 15px;
    line-height: 12px;
    cursor: pointer;
}

#new,#new1 {
    display: flex;
    gap: 40px;
    font-weight: bolder;
    color: rgb(74, 74, 74);
    /* margin-left: 80px; */
    /* border-bottom: 0.5px solid #2f3337; */
    padding-left: 80px;
}
#new>p>a{
    color: #2f3337;
    text-decoration: none;
}
#new1>p>a{
    color: #2f3337;
    text-decoration: none;
}
.linesubmit{
    text-align:center;
    color:#2563eb;
    font-size:28px;
    margin:30px 0;
}
.Sub{
    width: 90px;
    margin-top: 4px;
    border: 2px solid rgb(215, 187, 187);

}
.inc,
.dec{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#2563eb;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    margin:10px 8px;
}

.inc:hover,
.dec:hover{
    background:#1d4ed8;
}
.valuecount{
    display: block;
    
    width: 15px;
    position: relative;
    top: -22px;
    left: 34px;
    
}
.checkoutBtn{
    display:block;
    width:320px;
    height:50px;
    margin:20px auto 40px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.checkoutBtn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

    </style>
</head>
<body>
    <body>
     
    <div class="conatiner"> 
    </div>
</body>
</html>
<script>
var c =0|| localStorage.getItem("counter")

var cartArr = JSON.parse(localStorage.getItem("cartdata"))||[];
h2 = document.createElement("h2")
document.querySelector("body").append(h2)
totalsum(cartArr)
function totalsum(cartArr){
    var sum = cartArr.reduce(function(acc,el){
        return acc+el.price*el.quan
    },0)
    // console.log(sum)
  var subt = document.querySelector("h2") 
  subt.setAttribute("class","linesubmit")
  subt.innerText=  "Your subtotal is:"+ sum
  }

     promocode = document.createElement("input")
     promocode.placeholder = "Apply promocode"
     promocode.setAttribute("class","stotal")
     promocode.setAttribute("type","text")
     
     prosubmit = document.createElement("button")
     prosubmit.innerText="Apply"
     prosubmit.setAttribute("class","Sub")
     prosubmit.style.backgroundColor = "#00afef"
     prosubmit.addEventListener("click",checkpro)



function checkpro(){

    if(promocode.value == "coupon20"){
        var sum = cartArr.reduce(function(acc,el){
        return acc+el.price*el.quan
    },0)  
    sum = Math.floor(sum*0.80)
    var subt = document.querySelector("h2") 
    subt.innerText=  "Your subtotal is:"+ sum
    alert("Voucher applied")
    }
    else{
        alert("promo code doesn't exist")
    }
}


display(cartArr)

function display(cartArr){
    document.querySelector(".conatiner").innerHTML = ""
    cartArr.forEach(function(ele,index){
       var dataofbeautypro= document.querySelector(".conatiner")

       div1 = document.createElement("div")
       div1.setAttribute("id","box")

       img = document.createElement("img")
       img.src = ele.img_url
       
       disp = document.createElement("p")
       disp.innerText = ele.dis

       h5 = document.createElement("h5")
       h5.innerText = ele.dis1

      rs = document.createElement("p")
      rs.setAttribute("class","rs")
      rs.innerText ="Rs" + ele.price
      


      h6 = document.createElement("h6")
      h6.innerText = ele.review
     
     var deleteitem = document.createElement("button")
     deleteitem.innerText = "Delete"
     deleteitem.setAttribute("class","del")
     deleteitem.addEventListener("click",function(){
         Del(ele,index)
     })

     var divcount = document.createElement("div")
     divcount.setAttribute("class","divcount")


     var inc = document.createElement("button")
     inc.setAttribute("class","inc")
     inc.innerText = "+"
     inc.addEventListener("click",function(){
         increment(ele)
     })
    
     var dec = document.createElement("button")
     dec.setAttribute("class","dec")
     dec.innerText= "-"
     dec.addEventListener("click",function(){
         decrement(ele)
     })
    
     var count = document.createElement("h5")
     count.setAttribute("class","valuecount")
      count.innerText = ele.quan

      div1.append(img,disp,h5,rs,h6,deleteitem,divcount,inc,dec,count)
     dataofbeautypro.append(div1)
    
    })
   
   
  }
 var checkoutBtn = document.createElement("button");

checkoutBtn.innerText = "Proceed to Checkout";

checkoutBtn.setAttribute("class","checkoutBtn");

checkoutBtn.addEventListener("click",function(){

    if(cartArr.length===0){
        alert("Your cart is empty!");
        return;
    }

    window.location.href="payment.html";
});

document.querySelector("body").append(
    promocode,
    prosubmit,
    checkoutBtn
);
  function Del(ele,index){
  cartArr.splice(index,1)
    localStorage.setItem("cartdata",JSON.stringify(cartArr))
    window.location.reload()
     
  }

  function increment(ele){
      c++
      localStorage.setItem("counter",c)
      ele.quan = c
      display(cartArr)
      totalsum(cartArr)
    //   checkpro(cartArr)
  }
  function decrement(ele){
      c--
      localStorage.setItem("counter",c)
      ele.quan = c
      display(cartArr)
      totalsum(cartArr)
    //   checkpro(cartArr) 
  }



</script>
